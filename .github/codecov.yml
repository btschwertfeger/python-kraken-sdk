# -*- coding: utf-8 -*-
# Coverage is uploaded from several test jobs, each tagged with its own flag
# (spot-public, spot-private, futures-public, futures-private). Carryforward
# lets Codecov reuse a flag's last-known coverage on commits where that flag is
# absent, so the reported total does not drop when a partition is skipped
# (e.g. a flaky failure or a fork PR that cannot run the private jobs).
flag_management:
  default_rules:
    carryforward: true

coverage:
  ##    Status checks in PR
  ##
  status:
    project:
      default:
        informational: true
        ##    Target coverage is the last one
        ##
        target: auto
        ##    this allows a 2% drop from the previous base commit coverage
        ##
        threshold: 2%
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true # if false: post the comment even if coverage doesn't change
  require_base: no # [yes :: must have a base report to post]
  require_head: yes # [yes :: must have a head report to post]
