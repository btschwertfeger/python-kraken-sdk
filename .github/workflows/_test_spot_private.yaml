#
# Template workflow to test the private Spot endpoints of the
# python-kraken-sdk.
#
# Runs tests for:
#   * Spot REST clients
#   * Spot websocket clients
#

name: Test Spot

on:
  workflow_call:
    inputs:
      os:
        type: string
        required: true
      python-version:
        type: string
        required: true
    secrets:
      SPOT_API_KEY:
        required: true
      SPOT_SECRET_KEY:
        required: true
      XSTOCKS_API_KEY:
        required: true
      XSTOCKS_SECRET_KEY:
        required: true
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  Test-Spot:
    name: Test ${{ inputs.os }} ${{ inputs.python-version }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: 10
    concurrency:
      group: test_spot_private
      cancel-in-progress: true
    env:
      OS: ${{ inputs.os }}
      PYTHON: ${{ inputs.python-version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.codecov.io:443
            api.github.com:443
            api.kraken.com:443
            cli.codecov.io:443
            files.pythonhosted.org:443
            github.com:443
            ingest.codecov.io:443
            objects.githubusercontent.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            ws-auth.kraken.com:443
            ws.kraken.com:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download the built wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install package (Linux or macOS)
        if: runner.os != 'Windows'
        run: |
          uv venv
          source .venv/bin/activate
          echo ${GITHUB_WORKSPACE}/.venv/bin >> $GITHUB_PATH
          uv pip install "$(find dist -name '*.whl' | head -1)" -r requirements-dev.txt

      - name: Install package (Windows)
        if: runner.os == 'Windows'
        run: |
          uv venv
          .venv\Scripts\activate.ps1
          echo "$env:GITHUB_WORKSPACE\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $wheel = (Get-ChildItem -Path dist -Filter "*.whl" | Select-Object -First 1).FullName
          uv pip install $wheel -r requirements-dev.txt

      - name: Testing Spot REST endpoints
        env:
          SPOT_API_KEY: ${{ secrets.SPOT_API_KEY }}
          SPOT_SECRET_KEY: ${{ secrets.SPOT_SECRET_KEY }}
          XSTOCKS_API_KEY: ${{ secrets.XSTOCKS_API_KEY }}
          XSTOCKS_SECRET_KEY: ${{ secrets.XSTOCKS_SECRET_KEY }}
        run: >
          pytest -vv -x -m "spot and spot_auth and not spot_websocket"
          --cov=kraken --cov-append --cov-report=
          --junitxml=junit-spot-private-rest.xml -o junit_family=legacy tests

      - name: Testing Spot websocket client
        env:
          SPOT_API_KEY: ${{ secrets.SPOT_API_KEY }}
          SPOT_SECRET_KEY: ${{ secrets.SPOT_SECRET_KEY }}
        run: >
          pytest -vv -x -m "spot and spot_auth and spot_websocket"
          --cov=kraken --cov-append --cov-report=xml:coverage.xml
          --junitxml=junit-spot-private-ws.xml -o junit_family=legacy tests

      - name: Upload coverage to Codecov
        if: runner.os != 'Windows' && github.actor == 'btschwertfeger'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: spot-private
          env_vars: OS,PYTHON
          fail_ci_if_error: false
          report_type: coverage
          name: codecov-umbrella

      - name: Upload test results to Codecov
        if: runner.os != 'Windows' && github.actor == 'btschwertfeger'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit-spot-private-rest.xml,junit-spot-private-ws.xml
          flags: spot-private
          env_vars: OS,PYTHON
          fail_ci_if_error: false
          report_type: test_results
          name: codecov-umbrella
