# Template workflow to build the project for a specific os
# and Python version.
#

name: Build

on:
  workflow_call:
    inputs:
      os:
        type: string
        required: true
      python-version:
        type: string
        required: true

permissions:
  contents: read

jobs:
  Build:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # IMPORTANT: otherwise the current tag does not get fetched and the build version gets worse

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Check git status (not Windows)
        if: runner.os != 'Windows'
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes found."
          else
            echo "Changes detected. Please commit or discard changes before publishing."
            git status --porcelain
            exit 1
          fi

      - name: Check git status (Windows)
        if: runner.os == 'Windows'
        run: |
          if (-not (git status --porcelain)) {
              Write-Output "No changes found."
          } else {
              Write-Output "Changes detected. Please commit or discard changes before publishing."
              git status --porcelain
              exit 1
          }

      - name: Build Linux
        if: runner.os == 'linux'
        run: |
          uv build .
          uv tool install dist/python_kraken_sdk*.whl
          uv run kraken --version

      - name: Build macOS
        if: runner.os == 'macOS'
        run: |
          uv build .
          uv tool install dist/python_kraken_sdk*.whl
          uv run kraken --version

      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          uv build .
          try {
              $WHEEL = Get-ChildItem -Path ./dist -Filter "python_kraken_sdk*.whl" -ErrorAction Stop
              uv tool install $WHEEL#
              uv run kraken --version
          } catch {
              Write-Error "Error: .whl file not found in .\dist."
              exit 1
          }

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # upload artifacts with the oldest supported version
        if: runner.os == 'linux' && inputs.python-version == '3.11'
        with:
          name: python-package-distributions
          path: dist/

      # Generate a CycloneDX SBOM from an environment that has the freshly built
      # wheel installed, so the manifest captures the full transitive dependency
      # tree. Kept out of dist/ so the publish job never uploads it to PyPI. The
      # release job attests it and attaches it to the GitHub Release.
      - name: Generate CycloneDX SBOM
        if: runner.os == 'linux' && inputs.python-version == '3.11'
        run: |
          uv venv .venv-sbom
          uv pip install --python .venv-sbom/bin/python dist/python_kraken_sdk*.whl
          uvx --from cyclonedx-bom cyclonedx-py environment .venv-sbom/bin/python \
            --pyproject pyproject.toml \
            --output-format JSON \
            --output-file sbom.cdx.json
          # setuptools_scm makes the version dynamic, so --pyproject reads no version
          # from pyproject.toml. Inject the built version (from the wheel filename) into
          # the SBOM's root component so the manifest carries the released version.
          VERSION="$(ls dist/python_kraken_sdk-*.whl | sed -E 's|.*python_kraken_sdk-(.+)-py3-none-any\.whl|\1|')"
          jq --arg v "$VERSION" \
            '.metadata.component.version = $v
             | .metadata.component.purl = ("pkg:pypi/python-kraken-sdk@" + $v)' \
            sbom.cdx.json > sbom.cdx.tmp && mv sbom.cdx.tmp sbom.cdx.json

      - name: Store the SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: runner.os == 'linux' && inputs.python-version == '3.11'
        with:
          name: sbom
          path: sbom.cdx.json
